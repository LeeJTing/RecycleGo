name: recycle_go
description: "Mobile application assignment RSW Y2S3 G10"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  provider: ^6.1.2
  supabase_flutter: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
l10n:
  arb-dir: lib/l10n        # or your custom path
  template-arb-file: app_en.arb
  output-localization-file: app_localizations.dart
  assets:
    - assets/models/best_model.tflite
    - assets/models/labels.txt